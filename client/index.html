<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoFarm 🌱</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      #game-container {
        position: relative;
      }
      #hud-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud-overlay"></div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
